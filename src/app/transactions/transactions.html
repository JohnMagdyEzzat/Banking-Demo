<div class="transactions-body">
  <div class="transactions-container">
    <div class="transaction-container-header">
      <h2>Transactions for Account {{ accountID }}</h2>
      <button class="back-btn" (click)="goBack()">← Back</button>
    </div>

    <button class="btn btn-primary">Create new transaction</button>

    <app-filters (filterChange)="onFilterChange($event)" (sort)="onSort($event)"></app-filters>

    <app-card
      [cardData]="(filteredData$ | async) || []"
      [cardHeaderElements]="headerElements"
      [cardBodyElements]="bodyElements"
      [cardFooterElements]="footerElements"
    ></app-card>
  </div>
</div>
